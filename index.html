<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tarefas - Incremento 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <style>
    body { max-width: 600px; margin: 40px auto; padding: 20px; background: #ccb2f6; color: #17150F; }
    h1 { color: #5092f6; }
    form { display: flex; gap: 10px; margin-bottom: 20px; }
    input[type="text"] { flex: 1; padding: 10px; border: 1px solid #db88ef; border-radius: 8px; }
    button { padding: 10px 15px; background: #951ecc; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button.delete { background: #da22e4; }
    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; gap: 10px; background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 1px 2px rgba(20,18,12,.04); }
    .texto-tarefa { flex: 1; }
    .concluida { text-decoration: line-through; color: #8852b0; }
  </style>
</head>
<body>

  <h1>Minhas Tarefas</h1>
  
  <form id="form-tarefa">
  <input type="text" id="nova-tarefa" placeholder="Que bexiga eu tenho que fazer?" required>
  <input type="text" id="horario-tarefa" placeholder="Ex: De 9h-9h30">
  <button type="submit">Adicionar</button>
</form>

  <ul id="lista-tarefas"></ul>

  <script>
    // IMPORTANTE: Substitua pela URL real do seu Cloudflare Worker
    const API_URL = "https://listapi.robertajovemtech.workers.dev";

    const lista = document.getElementById("lista-tarefas");
    const form = document.getElementById("form-tarefa");
    const inputNova = document.getElementById("nova-tarefa");
    const inputHorario = document.getElementById("horario-tarefa"); // NOVO CAMPO

    async function carregarTarefas() {
      const res = await fetch(`${API_URL}/tarefas`);
      const tarefas = await res.json();
      
      lista.innerHTML = "";
      tarefas.forEach(t => {
        const li = document.createElement("li");
        
        // Verifica se a tarefa tem horário para exibir
        const textoHorario = t.horario ? `<strong>${t.horario}</strong> - ` : "";
        
        li.innerHTML = `
          <input type="checkbox" ${t.concluida ? "checked" : ""} onchange="atualizarTarefa(${t.id}, this.checked)">
          <span class="texto-tarefa ${t.concluida ? "concluida" : ""}">${textoHorario}${t.texto}</span>
          <button class="delete" onclick="deletarTarefa(${t.id})">Apagar</button>
        `;
        lista.appendChild(li);
      });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const texto = inputNova.value;
      const horario = inputHorario.value; // PEGA O VALOR DO HORÁRIO
      
      await fetch(`${API_URL}/tarefas`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto, horario }) // ENVIA O HORÁRIO PARA O BACKEND
      });
      
      inputNova.value = "";
      inputHorario.value = ""; // LIMPA O CAMPO APÓS ENVIAR
      carregarTarefas(); 
    });

    async function atualizarTarefa(id, concluida) {
      await fetch(`${API_URL}/tarefas/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ concluida })
      });
      carregarTarefas(); 
    }

    async function deletarTarefa(id) {
      await fetch(`${API_URL}/tarefas/${id}`, { method: "DELETE" });
      carregarTarefas(); 
    }

    carregarTarefas();
     </script>
</body>
</html>
