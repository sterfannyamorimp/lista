<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tarefas - Incremento 2</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #FBFAF8; color: #17150F; }
    h1 { color: #1E5FCC; }
    form { display: flex; gap: 10px; margin-bottom: 20px; }
    input[type="text"] { flex: 1; padding: 10px; border: 1px solid #D8D3C7; border-radius: 8px; }
    button { padding: 10px 15px; background: #1E5FCC; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button.delete { background: #B5701A; }
    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; gap: 10px; background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 1px 2px rgba(20,18,12,.04); }
    .texto-tarefa { flex: 1; }
    .concluida { text-decoration: line-through; color: #928E84; }
  </style>
</head>
<body>

  <h1>Minhas Tarefas</h1>
  
  <form id="form-tarefa">
    <input type="text" id="nova-tarefa" placeholder="O que precisa ser feito?" required>
    <button type="submit">Adicionar</button>
  </form>

  <ul id="lista-tarefas"></ul>

  <script>
    // IMPORTANTE: Substitua pela URL real do seu Cloudflare Worker
    const API_URL = "https://listapi.robertajovemtech.workers.dev/";

    const lista = document.getElementById("lista-tarefas");
    const form = document.getElementById("form-tarefa");
    const inputNova = document.getElementById("nova-tarefa");

    // Lista todas as tarefas
    async function carregarTarefas() {
      const res = await fetch(`${API_URL}/tarefas`);
      const tarefas = await res.json();
      
      lista.innerHTML = "";
      tarefas.forEach(t => {
        const li = document.createElement("li");
        
        li.innerHTML = `
          <input type="checkbox" ${t.concluida ? "checked" : ""} onchange="atualizarTarefa(${t.id}, this.checked)">
          <span class="texto-tarefa ${t.concluida ? "concluida" : ""}">${t.texto}</span>
          <button class="delete" onclick="deletarTarefa(${t.id})">Apagar</button>
        `;
        lista.appendChild(li);
      });
    }

    // Adiciona uma tarefa
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const texto = inputNova.value;
      
      await fetch(`${API_URL}/tarefas`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto })
      });
      
      inputNova.value = "";
      carregarTarefas(); // Atualiza a interface
    });

    // Atualiza o status (Concluída)
    async function atualizarTarefa(id, concluida) {
      await fetch(`${API_URL}/tarefas/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ concluida })
      });
      carregarTarefas(); // Atualiza a interface
    }

    // Apaga a tarefa
    async function deletarTarefa(id) {
      await fetch(`${API_URL}/tarefas/${id}`, { method: "DELETE" });
      carregarTarefas(); // Atualiza a interface
    }

    // Inicializa a página carregando os dados
    carregarTarefas();
  </script>
</body>
</html>
